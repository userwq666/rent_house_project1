# ==========================================
# Spring Boot Application Configuration
# ==========================================

spring.application.name=RentHouseSystem

# ==========================================
# Database Configuration
# ==========================================
# 自动创建数据库（不存在时）
spring.datasource.url=jdbc:mysql://localhost:3306/easy_rent?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA/Hibernate Configuration
# ==========================================
# 开发环境使用 update，启动时自动补齐表结构
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# SQL Initialization
# ==========================================
# 每次启动执行 schema-v3.sql；同时 DataInitializer 会确保默认 admin 账号存在
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-v3.sql
spring.sql.init.continue-on-error=true

# ==========================================
# Server Configuration
# ==========================================
server.port=8080

# ==========================================
# Logging Configuration
# ==========================================
logging.level.org.springframework=INFO
logging.level.com.renthouse=INFO
