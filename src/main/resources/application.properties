# ==========================================
# Spring Boot Application Configuration
# ==========================================

spring.application.name=RentHouseSystem

# ==========================================
# Database Configuration
# ==========================================
# 채쩍쩔챌혬짢 createDatabaseIfNotExist 챔혝짧책혡짢책혞혴책쨩쨘챈혮째챈혥짰책쨘혫
spring.datasource.url=jdbc:mysql://localhost:3306/easy_rent?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA/Hibernate Configuration
# ==========================================
# 채쩍쩔챌혬짢 JPA 챔혝짧책혡짢책쨩쨘챔징짢
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# SQL Initialization
# ==========================================
# 챌짝혖챌혬짢 SQL 챔혙혳챈혵짭책혞혶책짠혢책혣혯챦쩌혣챈혬쨔챌혬짢 JPA 챔혝짧책혡짢책쨩쨘챔징짢 + DataInitializer 책혞혶책짠혢책혣혯챈혮째챈혥짰
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-v3.sql
spring.sql.init.continue-on-error=true

# ==========================================
# Server Configuration
# ==========================================
server.port=8080

# ==========================================
# Logging Configuration
# ==========================================
logging.level.org.springframework=INFO
logging.level.com.renthouse=INFO
